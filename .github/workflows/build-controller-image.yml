name: Build and publish KAITO AMD controller

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Controller image tag to publish"
        required: true
        default: "amd-rocm-controller-poc"
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "api/**"
      - "pkg/**"
      - "presets/workspace/models/**"
      - "docker/workspace/Dockerfile"
      - ".github/workflows/build-controller-image.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-controller

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="sha-${GITHUB_SHA::12}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish AMD controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/workspace/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd-rocm-controller-poc
          build-args: |
            VERSION=${{ steps.meta.outputs.tag }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
