name: Build and publish KAITO ROCm image

on:
  push:
    branches: [main]
    paths:
      - "docker/presets/models/tfs/**"
      - "presets/workspace/dependencies/**"
      - "presets/workspace/inference/**"
      - "presets/workspace/tuning/text-generation/**"
      - "presets/workspace/inference/chat_templates/**"
      - ".github/workflows/build-rocm-image.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish"
        required: true
        default: "amd-rocm-poc"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  RUNTIME_BASE_IMAGE: docker.io/rocm/vllm-dev@sha256:89b2e1b1668074b06f59ec52adaca16c58735f3eb4c86a51a4af58d2c94933b8
  VLLM_VERSION: "0.22.1"

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="sha-${GITHUB_SHA::12}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish AMD64 ROCm image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/presets/models/tfs/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd-rocm-poc
          build-args: |
            MODEL_TYPE=text-generation
            VERSION=${{ steps.meta.outputs.tag }}
            GPU_PROVIDER=amd
            ROCM_VERSION=7.1
            RUNTIME_BASE_IMAGE=${{ env.RUNTIME_BASE_IMAGE }}
            VLLM_VERSION=${{ env.VLLM_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record image reference
        run: |
          echo "Published ghcr.io/${GITHUB_REPOSITORY}:${{ steps.meta.outputs.tag }}"
          echo "The immutable digest is available in the workflow summary and package metadata."
